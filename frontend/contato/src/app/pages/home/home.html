<mat-sidenav-container class="sidenav-container">

  <!-- Menu Lateral Esquerdo -->
  <mat-sidenav mode="side" opened class="sidenav">
    <div class="logo-area">
      <h2>Contatos </h2>
    </div>

    <mat-nav-list>
      <a mat-list-item href="#">
        <mat-icon matListItemIcon>home</mat-icon>
        <div matListItemTitle>Início</div>
      </a>
      <a mat-list-item href="#" class="active-menu">
        <mat-icon matListItemIcon>contacts</mat-icon>
        <div matListItemTitle>Contatos</div>
      </a>
      <a mat-list-item href="#">
        <mat-icon matListItemIcon>settings</mat-icon>
        <div matListItemTitle>Configurações</div>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Conteúdo Principal da Direita -->
  <mat-sidenav-content class="main-content">

    <!-- Cabeçalho Superior -->
    <mat-toolbar class="top-bar">
      <span>Painel de Gestão</span>
      <span class="spacer"></span>
      <button mat-icon-button (click)="sair()" title="Sair do sistema">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <!-- Área da Tabela Expansível -->
    <div class="content-padding">

      <div class="page-header">
        <h2>Meus Contatos</h2>
        <button mat-raised-button color="primary" routerLink="/novo-contato">
          <mat-icon>add</mat-icon> Novo Contato
        </button>
      </div>

      <!-- Aqui está o componente que abre e fecha ao clicar -->
      <mat-accordion>
        <mat-expansion-panel [expanded]="true">
          <mat-expansion-panel-header>
            <mat-panel-title>
              <mat-icon>list</mat-icon> Lista de Contatos Salvos
            </mat-panel-title>
            <mat-panel-description>
              Clique para expandir ou recolher a tabela
            </mat-panel-description>
          </mat-expansion-panel-header>

          <!-- A sua tabela vai aqui dentro! -->
          <table mat-table [dataSource]="contatos" class="full-width-table">

            <ng-container matColumnDef="nome">
              <th mat-header-cell *matHeaderCellDef> Nome </th>
              <td mat-cell *matCellDef="let element"> {{element.nome}} </td>
            </ng-container>

            <ng-container matColumnDef="celular">
              <th mat-header-cell *matHeaderCellDef> celular </th>
              <td mat-cell *matCellDef="let element"> {{element.celular}} </td>
            </ng-container>

            <ng-container matColumnDef="favorito">
              <th mat-header-cell *matHeaderCellDef> Favorito </th>
              <td mat-cell *matCellDef="let element"> {{element.favorito}} </td>
            </ng-container>

            <ng-container matColumnDef="etiquetas">
              <th mat-header-cell *matHeaderCellDef> Etiquetas </th>
              <td mat-cell *matCellDef="let element"> {{element.etiquetas}} </td>
            </ng-container>

            <!--    <ng-container matColumnDef="grupos">-->
            <!--      <th mat-header-cell *matHeaderCellDef> grupos </th>-->
            <!--      <td mat-cell *matCellDef="let element"> {{element.grupos}} </td>-->
            <!--    </ng-container>-->

            <ng-container matColumnDef="acoes">
              <th mat-header-cell *matHeaderCellDef> Ações </th>
              <td mat-cell *matCellDef="let element">
                <button mat-icon-button color="primary"><mat-icon>edit</mat-icon></button>
                <button mat-icon-button color="warn" (click)="excluir(element.id)"><mat-icon>delete</mat-icon>
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="colunas"></tr>
            <tr mat-row *matRowDef="let row; columns: colunas;"></tr>

          </table>

        </mat-expansion-panel>
      </mat-accordion>

    </div>
  </mat-sidenav-content>
</mat-sidenav-container>

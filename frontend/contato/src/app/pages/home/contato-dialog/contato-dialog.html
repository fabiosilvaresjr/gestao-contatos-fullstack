<h2 mat-dialog-title>
  {{ data ? 'Editar Contato' : 'Novo Contato' }}
</h2>

<mat-dialog-content>
  <form [formGroup]="formContato" class="form-container">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nome Completo</mat-label>
      <input matInput formControlName="nome" placeholder="Ex: Fabio Almeida">
      <mat-error *ngIf="formContato.get('nome')?.hasError('required')">
        O nome é obrigatório
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Celular</mat-label>
      <input matInput formControlName="celular" placeholder="Ex: (61) 99999-9999">
      <mat-icon matSuffix>smartphone</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Grupos (ex: Família, Trabalho)</mat-label>
      <input matInput formControlName="grupos">
    </mat-form-field>

    <div class="checkbox-container">
      <mat-checkbox formControlName="favorito" color="primary">
        Marcar como Favorito
      </mat-checkbox>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="salvar()" [disabled]="formContato.invalid">
    Salvar
  </button>
</mat-dialog-actions>
